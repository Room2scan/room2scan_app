<svg width="1200" height="640" viewBox="0 0 1200 640"
     xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

<defs>
  <!-- Arrowheads -->
  <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="#2563EB"/>
  </marker>
  <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,1 L9,5 L0,9 Z" fill="#7C3AED"/>
  </marker>

  <!-- Gradients -->
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#EEF2FF"/>
    <stop offset="1" stop-color="#F5F0FF"/>
  </linearGradient>
  <linearGradient id="rnHead" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#1D4ED8"/>
    <stop offset="1" stop-color="#3B82F6"/>
  </linearGradient>
  <linearGradient id="unHead" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#6D28D9"/>
    <stop offset="1" stop-color="#8B5CF6"/>
  </linearGradient>

  <!-- Shadows -->
  <filter id="sRN" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#3B82F6" flood-opacity="0.14"/>
  </filter>
  <filter id="sUN" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#7C3AED" flood-opacity="0.14"/>
  </filter>
</defs>

<!-- ── Background ── -->
<rect width="1200" height="640" fill="url(#bgGrad)"/>

<!-- ── Title ── -->
<text x="600" y="50" text-anchor="middle"
      font-size="28" font-weight="700" fill="#0F172A" letter-spacing="-0.5">
  React Native  ↔  Unity Bridge
</text>
<text x="600" y="72" text-anchor="middle" font-size="13" fill="#64748B">
  room2scan · bridge architecture
</text>


<!-- ════════════════ REACT NATIVE BOX ════════════════ -->
<rect x="44" y="98" width="362" height="498" rx="18"
      fill="white" stroke="#93C5FD" stroke-width="2.5" filter="url(#sRN)"/>

<!-- Header -->
<rect x="44" y="98"  width="362" height="57" rx="18" fill="url(#rnHead)"/>
<rect x="44" y="135" width="362" height="20"  fill="url(#rnHead)"/>
<text x="225" y="133" text-anchor="middle"
      font-size="19" font-weight="700" fill="white">React Native</text>

<!-- Item 1 -->
<rect x="66" y="174" width="318" height="68" rx="11"
      fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
<text x="225" y="202" text-anchor="middle"
      font-size="15" font-weight="600" fill="#1E40AF">UnityEditorScreen</text>
<text x="225" y="223" text-anchor="middle"
      font-size="12" fill="#6B7280">Unity View 호스트 · 방 편집 UI</text>

<!-- Item 2 -->
<rect x="66" y="258" width="318" height="68" rx="11"
      fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
<text x="225" y="286" text-anchor="middle"
      font-size="15" font-weight="600" fill="#1E40AF">sendToUnity(cmd)</text>
<text x="225" y="307" text-anchor="middle"
      font-size="12" fill="#6B7280">postMessage → UnityBridge GameObject</text>

<!-- Item 3 -->
<rect x="66" y="342" width="318" height="68" rx="11"
      fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
<text x="225" y="370" text-anchor="middle"
      font-size="15" font-weight="600" fill="#1E40AF">handleUnityEvent(e)</text>
<text x="225" y="391" text-anchor="middle"
      font-size="12" fill="#6B7280">Unity 이벤트 수신 · 상태 갱신</text>

<!-- Divider -->
<line x1="66" y1="428" x2="384" y2="428"
      stroke="#DBEAFE" stroke-width="1.5" stroke-dasharray="5 3"/>

<!-- Fallback -->
<rect x="66" y="438" width="318" height="60" rx="11"
      fill="#FEFCE8" stroke="#FDE68A" stroke-width="1.5"/>
<text x="225" y="462" text-anchor="middle"
      font-size="13" font-weight="700" fill="#92400E">⚡ Simulation Fallback</text>
<text x="225" y="482" text-anchor="middle"
      font-size="11" fill="#A16207">4s timeout → 2D 플로어 플랜 (Expo Go용)</text>


<!-- ════════════════ UNITY BOX ════════════════ -->
<rect x="794" y="98" width="362" height="498" rx="18"
      fill="white" stroke="#C4B5FD" stroke-width="2.5" filter="url(#sUN)"/>

<!-- Header -->
<rect x="794" y="98"  width="362" height="57" rx="18" fill="url(#unHead)"/>
<rect x="794" y="135" width="362" height="20"  fill="url(#unHead)"/>
<text x="975" y="133" text-anchor="middle"
      font-size="19" font-weight="700" fill="white">Unity  (C#)</text>

<!-- Item 1 -->
<rect x="816" y="174" width="318" height="68" rx="11"
      fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
<text x="975" y="202" text-anchor="middle"
      font-size="15" font-weight="600" fill="#5B21B6">UnityBridge.cs</text>
<text x="975" y="223" text-anchor="middle"
      font-size="12" fill="#6B7280">Singleton · ReceiveFromRN() · Dispatch</text>

<!-- Item 2 -->
<rect x="816" y="258" width="318" height="68" rx="11"
      fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
<text x="975" y="286" text-anchor="middle"
      font-size="15" font-weight="600" fill="#5B21B6">RoomManager.cs</text>
<text x="975" y="307" text-anchor="middle"
      font-size="12" fill="#6B7280">GLTFast 로더 · ReplicaCAD 씬 구성</text>

<!-- Item 3 -->
<rect x="816" y="342" width="318" height="68" rx="11"
      fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
<text x="975" y="370" text-anchor="middle"
      font-size="15" font-weight="600" fill="#5B21B6">FurnitureManager.cs</text>
<text x="975" y="391" text-anchor="middle"
      font-size="12" fill="#6B7280">가구 생성 · 이동 · 회전 · 삭제</text>

<!-- Divider -->
<line x1="816" y1="428" x2="1134" y2="428"
      stroke="#EDE9FE" stroke-width="1.5" stroke-dasharray="5 3"/>

<!-- Item 4 -->
<rect x="816" y="438" width="318" height="60" rx="11"
      fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
<text x="975" y="462" text-anchor="middle"
      font-size="13" font-weight="700" fill="#5B21B6">LayoutSerializer.cs</text>
<text x="975" y="482" text-anchor="middle"
      font-size="11" fill="#7C3AED">가구 배치 저장 / 불러오기</text>


<!-- ════════════════ ARROWS ════════════════ -->

<!-- Commands → (y = 292, aligned with Item 2 center) -->
<line x1="412" y1="292" x2="465" y2="292" stroke="#2563EB" stroke-width="3"/>
<line x1="736" y1="292" x2="789" y2="292" stroke="#2563EB" stroke-width="3"
      marker-end="url(#ab)"/>

<!-- Events ← (y = 376, aligned with Item 3 center) -->
<line x1="789" y1="376" x2="736" y2="376" stroke="#7C3AED" stroke-width="3"/>
<line x1="465" y1="376" x2="412" y2="376" stroke="#7C3AED" stroke-width="3"
      marker-end="url(#ap)"/>


<!-- ════════════════ ARROW LABELS (rendered above arrow lines) ════════════════ -->

<!-- Commands label box -->
<rect x="465" y="260" width="271" height="62" rx="11"
      fill="white" stroke="#93C5FD" stroke-width="2"/>
<text x="600" y="281" text-anchor="middle"
      font-size="14" font-weight="700" fill="#1D4ED8">Commands  →</text>
<text x="600" y="299" text-anchor="middle"
      font-size="11" fill="#3B82F6">LoadRoom · AddFurniture · DeleteSelected</text>
<text x="600" y="315" text-anchor="middle"
      font-size="11" fill="#3B82F6">RotateSelected · SaveLayout</text>

<!-- Events label box -->
<rect x="465" y="344" width="271" height="62" rx="11"
      fill="white" stroke="#C4B5FD" stroke-width="2"/>
<text x="600" y="365" text-anchor="middle"
      font-size="14" font-weight="700" fill="#6D28D9">←  Events</text>
<text x="600" y="383" text-anchor="middle"
      font-size="11" fill="#7C3AED">RoomLoaded · FurnitureMoved · LayoutSaved</text>
<text x="600" y="399" text-anchor="middle"
      font-size="11" fill="#7C3AED">Error</text>

<!-- Protocol badge -->
<rect x="492" y="440" width="216" height="52" rx="12"
      fill="white" stroke="#A7F3D0" stroke-width="2"/>
<text x="600" y="462" text-anchor="middle"
      font-size="12" font-weight="700" fill="#065F46">unity-bridge / v1</text>
<text x="600" y="481" text-anchor="middle"
      font-size="10" fill="#047857"
      font-family="'Consolas', 'Courier New', monospace">
  JSON · messageId · requestId · payload
</text>


<!-- ── Footer ── -->
<text x="600" y="620" text-anchor="middle" font-size="11" fill="#94A3B8">
  Expo Go / Dev 환경에서는 Simulation Fallback 자동 활성화 · 실기기 APK 빌드에서 완전한 Unity 뷰 사용 가능
</text>

</svg>
